<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logitech</title>
<link rel="stylesheet" href="style.css">
</head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<body>

<header class="header">
  <div class="container header__wrap">

    <div class="logo">
      <img src="images/logo.png" alt="">
    </div>
<div class="burger">
  <span></span>
</div>
    <nav class="nav">
      <a href="#">Головна</a>
      <a href="#products">Продукти</a>
      <a href="#contact">Контакти</a>
    </nav>

  </div>
</header>

<main>


<section class="hero">
  <div class="container hero__wrap">
    <div>
      <h1>Техніка Logitech</h1>
      <p>Якість, стиль та продуктивність</p>
      <a href="#" class="btn">Дізнатись більше</a>
    </div>
    <img src="images/mouse.jpg">
  </div>
</section>


<section id="products" class="products">
  <div class="container products__wrap">

    <div class="card">
      <img src="images/mouse.jpg">
      <h3>Мишi</h3>
    </div>

    <div class="card">
      <img src="images/keyboard.jpg">
      <h3>Клавіатури</h3>
    </div>

    <div class="card">
      <img src="images/headset.jpg">
      <h3>Гарнітура</h3>
    </div>

  </div>
</section>


<section class="setup">
  <div class="container setup__wrap">
    <img src="images/setup1.png">
    <img src="images/setup2.jpg">
  </div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
